<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>{{ page.title }} | GAAA</title>
  <style>
    @font-face {
        font-family: 'Forum'; 
        src: url('/assets/forum-regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    :root {
        --primary: #818385;
        --accent: #1C4072;
        --light: #2E8DCC;
        --white: #ffffff;
    }

    body {
        font-family: 'Forum', -apple-system, sans-serif;
        margin: 0;
        line-height: 1.6;
        color: var(--primary);
        background-color: var(--white);
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
    }

    /* Navigation & Logo Reset */
    nav {
        background: var(--white);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .logo img {
        height: 65px; /* Adjust this to change logo size */
        width: auto;
        display: block; /* Removes weird spacing under the image */
        vertical-align: middle;
    }

      /* This makes all images in your content area responsive */
    img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 1rem auto; /* Centers the image with some spacing */
        border-radius: 8px; /* Optional: gives it nice rounded corners */
    }

    .nav-links {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
        color: var(--light);
    }

    .nav-links li { margin-left: 20px; }

    .nav-links a {
        text-decoration: none;
        color: var(--light);
        font-weight: bold;
        transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* Forms & Buttons */
    input, textarea, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }

    .btn {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        border: none;
        cursor: pointer;
    }

    .social-links {
        margin-bottom: 15px;
    }

    .social-links a {
        color: var(--primary); /* Uses your dark blue/gray color */
        font-size: 1.5rem;      /* Makes the icons a nice size */
        margin: 0 10px;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .social-links a:hover {
        color: var(--accent);  /* Changes to your green 'accent' color on hover */
    }

    footer { text-align: center; padding: 40px; color: #777; }
    </style> 
</head>
<body>
    <div id="fb-root"></div>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v25.0&appId=APP_ID"></script>
    {% include navigation.html %}

    <div class="container">
        {{ content }}
    </div>
<footer>
    <div class="social-links">
        <a href="https://www.facebook.com/gwinnettanimaladvocacyalliance" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/gwinnettanimalshelteradvocates" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
    </div>
    <p>&copy; 2026 Gwinnett Animal Advocacy Alliance</p>
</footer>
</body>
</html>
