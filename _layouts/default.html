<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | GAAA</title>
  <style>
    @font-face {
    font-family: 'Forum'; /
    src: url('/assets/forum-regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
    :root {
        --primary: #2c3e50;
        --accent: #27ae60;
        --light: #f4f7f6;
        --white: #ffffff;
    }

    /* Reset and Layout */
    body {
        font-family: 'Forum', -apple-system, sans-serif;
        margin: 0;
        line-height: 1.6;
        color: var(--primary);
        background-color: var(--light);
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
    }

    /* Navigation & Logo Reset */
    nav {
        background: var(--white);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .logo img {
        height: 40px; /* Adjust this to change logo size */
        width: auto;
        display: block; /* Removes weird spacing under the image */
        vertical-align: middle;
    }

    .nav-links {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
    }

    .nav-links li { margin-left: 20px; }

    .nav-links a {
        text-decoration: none;
        color: var(--primary);
        font-weight: 500;
        transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* Forms & Buttons */
    input, textarea, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }

    .btn {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        border: none;
        cursor: pointer;
    }

    footer { text-align: center; padding: 40px; color: #777; }
    </style> 
</head>
<body>
    {% include navigation.html %}

    <div class="container">
        {{ content }}
    </div>

    <footer><p>&copy; 2026 Gwinnett Animal Advocacy Alliance</p></footer>
</body>
</html>
